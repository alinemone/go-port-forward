name: Release

on:
  push:
    tags:
      - 'v*'
      - '[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write

jobs:
  build:
    name: Build and Release
    runs-on: ubuntu-latest

    env:
      CGO_ENABLED: 0
      GOFLAGS: -trimpath -buildvcs=false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Get version from tag
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Build binaries
        run: |
          VERSION="${{ steps.get_version.outputs.VERSION }}"
          COMMIT="${GITHUB_SHA}"
          BUILD_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          LDFLAGS="-s -w -X main.Version=${VERSION} -X main.Commit=${COMMIT} -X main.BuildDate=${BUILD_DATE}"

          # Windows AMD64
          GOOS=windows GOARCH=amd64 go build -ldflags="${LDFLAGS}" -o pf-windows-amd64.exe

          # Linux AMD64
          GOOS=linux GOARCH=amd64 go build -ldflags="${LDFLAGS}" -o pf-linux-amd64

          # Linux ARM64
          GOOS=linux GOARCH=arm64 go build -ldflags="${LDFLAGS}" -o pf-linux-arm64

          # macOS Intel
          GOOS=darwin GOARCH=amd64 go build -ldflags="${LDFLAGS}" -o pf-darwin-amd64

          # macOS Apple Silicon
          GOOS=darwin GOARCH=arm64 go build -ldflags="${LDFLAGS}" -o pf-darwin-arm64

      - name: Sign Windows binary (optional)
        env:
          WINDOWS_P12_BASE64: ${{ secrets.WINDOWS_P12_BASE64 }}
          WINDOWS_P12_PASSWORD: ${{ secrets.WINDOWS_P12_PASSWORD }}
        run: |
          if [ -z "$WINDOWS_P12_BASE64" ] || [ -z "$WINDOWS_P12_PASSWORD" ]; then
            echo "Signing secrets not configured. Skipping Windows signing."
            exit 0
          fi

          sudo apt-get update
          sudo apt-get install -y osslsigncode

          echo "$WINDOWS_P12_BASE64" | base64 -d > windows-signing-cert.p12
          osslsigncode sign \
            -pkcs12 windows-signing-cert.p12 \
            -pass "$WINDOWS_P12_PASSWORD" \
            -n "pf - Port Forward Manager" \
            -i "https://github.com/alinemone/go-port-forward" \
            -h sha256 \
            -t "http://timestamp.digicert.com" \
            -in pf-windows-amd64.exe \
            -out pf-windows-amd64-signed.exe
          mv pf-windows-amd64-signed.exe pf-windows-amd64.exe
          rm -f windows-signing-cert.p12

      - name: Generate checksums
        run: |
          sha256sum \
            pf-windows-amd64.exe \
            pf-linux-amd64 \
            pf-linux-arm64 \
            pf-darwin-amd64 \
            pf-darwin-arm64 > SHA256SUMS.txt

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            pf-windows-amd64.exe
            pf-linux-amd64
            pf-linux-arm64
            pf-darwin-amd64
            pf-darwin-arm64
            SHA256SUMS.txt
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
